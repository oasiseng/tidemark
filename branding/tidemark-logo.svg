<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <style>
    .logo-text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; fill: #FF6B2B; }
    .logo-sub { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; fill: #1B3A4B; font-size: 12px; letter-spacing: 2px; }
  </style>
  <!-- Wave mark -->
  <path d="M10 55 Q25 35, 40 55 Q55 75, 70 55" stroke="#FF6B2B" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Stake mark -->
  <line x1="40" y1="30" x2="40" y2="80" stroke="#1B3A4B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="40" cy="28" r="3" fill="#E63946"/>
  <!-- Graduation ticks -->
  <line x1="43" y1="42" x2="48" y2="42" stroke="#1B3A4B" stroke-width="1.5"/>
  <line x1="43" y1="52" x2="48" y2="52" stroke="#1B3A4B" stroke-width="1.5"/>
  <line x1="43" y1="62" x2="48" y2="62" stroke="#1B3A4B" stroke-width="1.5"/>
  <line x1="43" y1="72" x2="48" y2="72" stroke="#1B3A4B" stroke-width="1.5"/>
  <!-- Wordmark -->
  <text class="logo-text" x="85" y="62" font-size="38">TideMark</text>
  <!-- Tagline -->
  <text class="logo-sub" x="87" y="78">ELEVATION REFERENCE SYSTEM</text>
</svg>
